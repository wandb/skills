name: Evaluate Skills

# Runs the WandBAgentFactory eval framework against skills in this repo
# using the Codex agent with MCP support (wbaf-refact branch).

on:
  push:
    branches: [main]
    paths: ["skills/**"]

  pull_request:
    branches: [main]
    paths: ["skills/**"]

  workflow_dispatch:
    inputs:
      eval_config:
        description: "Eval config in the WBAF repo (e.g. evals/codex-all.yaml)"
        required: false
        default: "evals/codex-all.yaml"
        type: string
      agent:
        description: "Agent config to use (e.g. codex-mcp)"
        required: false
        default: ""
        type: string

  schedule:
    # Weekly on Sundays at 11 PM PT (7 AM UTC Monday)
    - cron: "0 7 * * 1"

jobs:
  eval:
    name: Evaluate skills
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          path: agent-skills

      - name: Checkout WandBAgentFactory (wbaf-refact)
        uses: actions/checkout@v4
        with:
          repository: wandb/WandBAgentFactory
          ref: wbaf-refact
          token: ${{ secrets.WBAF_PAT }}
          path: wbaf

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        working-directory: wbaf
        run: uv python install

      - name: Install dependencies
        working-directory: wbaf
        run: uv sync

      - name: Copy skills into eval framework
        run: |
          echo "Copying skills from agent-skills into wbaf/skills/..."
          for skill_dir in agent-skills/skills/*/; do
            name="$(basename "$skill_dir")"
            if [[ -f "$skill_dir/SKILL.md" ]]; then
              # Copy into wbaf skills/ (overwrites if exists)
              cp -r "$skill_dir" "wbaf/skills/$name"
              echo "  $name"
            fi
          done

      - name: Determine agent
        id: agent
        run: |
          # Use input agent, or read from registry, or fall back to codex-mcp
          AGENT="${{ inputs.agent }}"
          if [[ -z "$AGENT" && -f wbaf/registry/best-agents.yaml ]]; then
            AGENT="$(uv run --directory wbaf python -c "
          import yaml
          with open('wbaf/registry/best-agents.yaml') as f:
              reg = yaml.safe_load(f)
          agents = reg.get('agents', [])
          print(agents[0] if agents else 'codex-mcp')
          ")"
          fi
          AGENT="${AGENT:-codex-mcp}"
          echo "agent=$AGENT" >> "$GITHUB_OUTPUT"
          echo "Using agent: $AGENT"

      - name: Run evaluation
        working-directory: wbaf
        run: |
          CONFIG="${{ inputs.eval_config || 'evals/codex-all.yaml' }}"
          AGENT="${{ steps.agent.outputs.agent }}"

          echo "Config: $CONFIG"
          echo "Agent: $AGENT"

          uv run python -W ignore -m core.run_eval \
            "$CONFIG" \
            --agent "$AGENT" \
            --weave-parallelism 15 \
            2>&1 | tee eval-output.log

      - name: Update README with results
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          uv run --directory wbaf python -c "
          import yaml, re
          from pathlib import Path

          skills_dir = Path('agent-skills/skills')
          readme = Path('agent-skills/README.md')

          # Build the skill table rows
          rows = []
          for skill_dir in sorted(skills_dir.iterdir()):
              if not skill_dir.is_dir() or not (skill_dir / 'SKILL.md').is_file():
                  continue
              name = skill_dir.name

              # Read description from frontmatter
              text = (skill_dir / 'SKILL.md').read_text()
              desc = ''
              if text.startswith('---'):
                  end = text.find('\n---', 3)
                  if end != -1:
                      fm = yaml.safe_load(text[3:end])
                      desc = fm.get('description', '') if isinstance(fm, dict) else ''
              # Truncate long descriptions
              if len(desc) > 100:
                  desc = desc[:97] + '...'

              rows.append(f'| [\`{name}\`](skills/{name}/) | {desc} | :white_check_mark: passing |')

          table = '\n'.join([
              '| Skill | Description | Status |',
              '|-------|-------------|--------|',
              *rows,
          ])

          # Replace between markers
          content = readme.read_text()
          pattern = r'<!-- BEGIN SKILL TABLE -->.*?<!-- END SKILL TABLE -->'
          replacement = f'<!-- BEGIN SKILL TABLE -->\n{table}\n<!-- END SKILL TABLE -->'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          readme.write_text(content)
          print('Updated README skill table')
          "

      - name: Commit results
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: agent-skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .badges/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update skill eval results"
            git push
          fi
