name: Evaluate Skills

# Evaluates skills from this repo using the WandBAgentFactory eval framework.
#
# Self-contained: copies skills into WBAF, writes a temp agent config
# referencing those skills, generates a temp eval YAML, and runs it.
# No changes needed in WandBAgentFactory to test new skills.
#
# Benchmarks against both Codex and Claude Code agents via matrix strategy.

on:
  push:
    branches: [main]
    paths: ["skills/**"]

  pull_request:
    branches: [main]
    paths: ["skills/**"]

  workflow_dispatch:
    inputs:
      skills:
        description: "Comma-separated skill names to test (blank = all in skills/)"
        required: false
        default: ""
        type: string
      base_agents:
        description: 'JSON array of base agents, e.g. ["codex-mcp","claude-code"]'
        required: false
        default: ""
        type: string
      eval_tasks:
        description: "Eval config name in WBAF (without .yaml extension)"
        required: false
        default: "all"
        type: string

  schedule:
    # Weekly on Sundays at 11 PM PT (7 AM UTC Monday)
    - cron: "0 7 * * 1"

jobs:
  eval:
    name: "Eval skills (${{ matrix.base_agent }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        base_agent: ${{ fromJson(inputs.base_agents || '["codex-mcp", "claude-code"]') }}

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          path: agent-skills

      - name: Checkout WandBAgentFactory
        uses: actions/checkout@v4
        with:
          repository: wandb/WandBAgentFactory
          ref: main
          token: ${{ secrets.WBAF_PAT }}
          path: wbaf

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        working-directory: wbaf
        run: uv python install

      - name: Install dependencies
        working-directory: wbaf
        run: uv sync

      - name: Configure Weave project
        working-directory: wbaf
        run: printf 'entity: wandb\nproject: wb-agent-frozen\n' > wandb_settings.yaml

      - name: Copy skills and generate eval configs
        id: setup
        run: |
          INPUT_SKILLS="${{ inputs.skills }}"
          BASE_AGENT="${{ matrix.base_agent }}"
          EVAL_TASKS="${{ inputs.eval_tasks || 'all' }}"

          # ── Discover skills ──
          if [[ -n "$INPUT_SKILLS" ]]; then
            IFS=',' read -ra SKILL_NAMES <<< "$INPUT_SKILLS"
          else
            SKILL_NAMES=()
            for d in agent-skills/skills/*/; do
              [[ -f "$d/SKILL.md" ]] && SKILL_NAMES+=("$(basename "$d")")
            done
          fi

          echo "Skills to test: ${SKILL_NAMES[*]}"
          echo "Base agent: $BASE_AGENT"

          # ── Copy skills into WBAF ──
          for name in "${SKILL_NAMES[@]}"; do
            name="$(echo "$name" | xargs)"
            src="agent-skills/skills/$name"
            dst="wbaf/skills/$name"
            if [[ -d "$src" ]]; then
              cp -r "$src" "$dst"
              echo "  copied: $name"
            else
              echo "  WARNING: $name not found in agent-skills/skills/, skipping"
            fi
          done

          # ── Write temp agent config ──
          # Unique name per matrix cell to avoid collisions
          AGENT_NAME="ci-skill-eval-${BASE_AGENT}"
          AGENT_DIR="wbaf/agents/${AGENT_NAME}"
          mkdir -p "$AGENT_DIR"

          uv run --directory wbaf python -c "
          import yaml
          from pathlib import Path

          skills = '${SKILL_NAMES[*]}'.split()
          config = {
              'extends': '$BASE_AGENT',
              'skills': skills,
          }
          Path('$AGENT_DIR/config.yaml').write_text(
              yaml.dump(config, default_flow_style=False)
          )
          print(f'Agent: $AGENT_NAME (extends $BASE_AGENT, skills={skills})')
          "

          # ── Write temp eval config ──
          EVAL_SRC="wbaf/evals/${EVAL_TASKS}.yaml"

          uv run --directory wbaf python -c "
          import yaml
          from pathlib import Path

          src = yaml.safe_load(Path('$EVAL_SRC').read_text())
          tasks = src.get('tasks', [])

          eval_spec = {
              'agents': ['$AGENT_NAME'],
              'scorers': src.get('scorers', ['rubric']),
              'tasks': tasks,
              'trials': 1,
          }

          out = Path('wbaf/evals/ci-skill-eval.yaml')
          out.write_text(yaml.dump(eval_spec, default_flow_style=False, sort_keys=False))
          print(f'Eval: {len(tasks)} tasks, scorers={eval_spec[\"scorers\"]}')
          "

          echo "agent_name=$AGENT_NAME" >> "$GITHUB_OUTPUT"
          echo "skills=${SKILL_NAMES[*]}" >> "$GITHUB_OUTPUT"

      - name: Run evaluation
        working-directory: wbaf
        run: |
          uv run python -W ignore -m core.run_eval \
            evals/ci-skill-eval.yaml \
            --weave-parallelism 15 \
            2>&1 | tee eval-output.log

      - name: Upload eval log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-log-${{ matrix.base_agent }}
          path: wbaf/eval-output.log
          retention-days: 30

  # ── Update README with aggregated results ──
  update-readme:
    name: Update README
    needs: eval
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4

      - name: Download all eval logs
        uses: actions/download-artifact@v4
        with:
          pattern: eval-log-*
          path: eval-logs/

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Update README with results
        run: |
          uv run python -c "
          import ast, re, yaml
          from pathlib import Path

          # ── Parse results from all eval logs ──
          results = {}
          for log_dir in sorted(Path('eval-logs').iterdir()):
              if not log_dir.is_dir():
                  continue
              agent = log_dir.name.replace('eval-log-', '')
              log_file = log_dir / 'eval-output.log'
              if not log_file.exists():
                  continue

              log = log_file.read_text()
              summary = {}
              for line in log.splitlines():
                  m = re.match(r'^[\w-]+:\s*(\{.+\})\s*$', line)
                  if m:
                      try:
                          summary = ast.literal_eval(m.group(1))
                      except Exception:
                          pass
              results[agent] = summary

          # ── Compute aggregate status across agents ──
          total_passed = 0
          total_tasks = 0
          agent_statuses = []

          for agent, summary in results.items():
              tasks_count = summary.get('output', {}).get('succeeded', {}).get('true_count', 0)
              scorer = summary.get('correctness') or summary.get('rubric') or {}
              passed = scorer.get('passed', {}).get('true_count', 0)
              score_mean = scorer.get('score', {}).get('mean', 0)
              total_passed += passed
              total_tasks += tasks_count
              if tasks_count > 0:
                  agent_statuses.append(f'{agent}: {passed}/{tasks_count} ({score_mean:.0%})')

          if total_tasks > 0:
              status = f'{total_passed}/{total_tasks} passing'
              if agent_statuses:
                  status += ' — ' + ', '.join(agent_statuses)
          else:
              status = 'evaluated'

          # ── Build skill table ──
          skills_dir = Path('skills')
          readme = Path('README.md')

          rows = []
          for skill_dir in sorted(skills_dir.iterdir()):
              if not skill_dir.is_dir() or not (skill_dir / 'SKILL.md').is_file():
                  continue
              name = skill_dir.name

              text = (skill_dir / 'SKILL.md').read_text()
              desc = ''
              if text.startswith('---'):
                  end = text.find('\n---', 3)
                  if end != -1:
                      fm = yaml.safe_load(text[3:end])
                      desc = fm.get('description', '') if isinstance(fm, dict) else ''
              if len(desc) > 100:
                  desc = desc[:97] + '...'

              rows.append(f'| [\`{name}\`](skills/{name}/) | {desc} | {status} |')

          table = '\n'.join([
              '| Skill | Description | Status |',
              '|-------|-------------|--------|',
              *rows,
          ])

          content = readme.read_text()
          pattern = r'<!-- BEGIN SKILL TABLE -->.*?<!-- END SKILL TABLE -->'
          replacement = f'<!-- BEGIN SKILL TABLE -->\n{table}\n<!-- END SKILL TABLE -->'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          readme.write_text(content)
          print(f'Updated README — status: {status}')
          "

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update skill eval results"
            git push
          fi
