name: Evaluate Skills

# Evaluates skills from this repo using the WandBAgentFactory eval framework.
#
# Self-contained: copies skills into WBAF, writes a temp agent config
# referencing those skills, generates a temp eval YAML, and runs it.
# No changes needed in WandBAgentFactory to test new skills.

on:
  push:
    branches: [main]
    paths: ["skills/**"]

  pull_request:
    branches: [main]
    paths: ["skills/**"]

  workflow_dispatch:
    inputs:
      skills:
        description: "Comma-separated skill names to test (blank = all in skills/)"
        required: false
        default: ""
        type: string
      base_agent:
        description: "Base agent config to extend (must have image: codex)"
        required: false
        default: "codex-mcp"
        type: string
      eval_tasks:
        description: "Eval config for task list (or 'all' for codex-all.yaml)"
        required: false
        default: "all"
        type: string

  schedule:
    # Weekly on Sundays at 11 PM PT (7 AM UTC Monday)
    - cron: "0 7 * * 1"

jobs:
  eval:
    name: Evaluate skills
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          path: agent-skills

      - name: Checkout WandBAgentFactory (wbaf-refact)
        uses: actions/checkout@v4
        with:
          repository: wandb/WandBAgentFactory
          ref: wbaf-refact
          token: ${{ secrets.WBAF_PAT }}
          path: wbaf

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        working-directory: wbaf
        run: uv python install

      - name: Install dependencies
        working-directory: wbaf
        run: uv sync

      - name: Copy skills and generate eval configs
        id: setup
        run: |
          INPUT_SKILLS="${{ inputs.skills }}"
          BASE_AGENT="${{ inputs.base_agent || 'codex-mcp' }}"
          EVAL_TASKS="${{ inputs.eval_tasks || 'all' }}"

          # ── Discover skills ──
          if [[ -n "$INPUT_SKILLS" ]]; then
            # Explicit list
            IFS=',' read -ra SKILL_NAMES <<< "$INPUT_SKILLS"
          else
            # Auto-discover from agent-skills/skills/
            SKILL_NAMES=()
            for d in agent-skills/skills/*/; do
              [[ -f "$d/SKILL.md" ]] && SKILL_NAMES+=("$(basename "$d")")
            done
          fi

          echo "Skills to test: ${SKILL_NAMES[*]}"

          # ── Copy skills into WBAF ──
          for name in "${SKILL_NAMES[@]}"; do
            name="$(echo "$name" | xargs)"  # trim whitespace
            src="agent-skills/skills/$name"
            dst="wbaf/skills/$name"
            if [[ -d "$src" ]]; then
              cp -r "$src" "$dst"
              echo "  copied: $name"
            else
              echo "  WARNING: $name not found in agent-skills/skills/, skipping"
            fi
          done

          # ── Write temp agent config ──
          # Extends the base agent (e.g. codex-mcp) and adds the skills
          AGENT_DIR="wbaf/agents/ci-skill-eval"
          mkdir -p "$AGENT_DIR"

          uv run --directory wbaf python -c "
          import yaml
          from pathlib import Path

          skills = '${SKILL_NAMES[*]}'.split()
          config = {
              'extends': '$BASE_AGENT',
              'skills': skills,
          }
          Path('$AGENT_DIR/config.yaml').write_text(
              yaml.dump(config, default_flow_style=False)
          )
          print(f'Wrote agent config: ci-skill-eval')
          print(f'  extends: $BASE_AGENT')
          print(f'  skills: {skills}')
          "

          # ── Write temp eval config ──
          if [[ "$EVAL_TASKS" == "all" ]]; then
            # Use the task list from codex-all.yaml
            EVAL_SRC="wbaf/evals/codex-all.yaml"
          else
            EVAL_SRC="wbaf/evals/$EVAL_TASKS"
          fi

          uv run --directory wbaf python -c "
          import yaml
          from pathlib import Path

          # Read tasks from source eval
          src = yaml.safe_load(Path('$EVAL_SRC').read_text())
          tasks = src.get('tasks', [])

          eval_spec = {
              'agents': ['ci-skill-eval'],
              'scorers': src.get('scorers', ['rubric']),
              'tasks': tasks,
              'trials': 1,
          }

          out = Path('wbaf/evals/ci-skill-eval.yaml')
          out.write_text(yaml.dump(eval_spec, default_flow_style=False, sort_keys=False))
          print(f'Wrote eval config: {out}')
          print(f'  agent: ci-skill-eval')
          print(f'  tasks: {len(tasks)}')
          print(f'  scorers: {eval_spec[\"scorers\"]}')
          "

          # Pass skill names to later steps
          echo "skills=${SKILL_NAMES[*]}" >> "$GITHUB_OUTPUT"

      - name: Run evaluation
        working-directory: wbaf
        run: |
          uv run python -W ignore -m core.run_eval \
            evals/ci-skill-eval.yaml \
            --weave-parallelism 15 \
            2>&1 | tee eval-output.log

      - name: Update README with results
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          uv run --directory wbaf python -c "
          import yaml, re
          from pathlib import Path

          skills_dir = Path('agent-skills/skills')
          readme = Path('agent-skills/README.md')

          rows = []
          for skill_dir in sorted(skills_dir.iterdir()):
              if not skill_dir.is_dir() or not (skill_dir / 'SKILL.md').is_file():
                  continue
              name = skill_dir.name

              text = (skill_dir / 'SKILL.md').read_text()
              desc = ''
              if text.startswith('---'):
                  end = text.find('\n---', 3)
                  if end != -1:
                      fm = yaml.safe_load(text[3:end])
                      desc = fm.get('description', '') if isinstance(fm, dict) else ''
              if len(desc) > 100:
                  desc = desc[:97] + '...'

              rows.append(f'| [\`{name}\`](skills/{name}/) | {desc} | :white_check_mark: passing |')

          table = '\n'.join([
              '| Skill | Description | Status |',
              '|-------|-------------|--------|',
              *rows,
          ])

          content = readme.read_text()
          pattern = r'<!-- BEGIN SKILL TABLE -->.*?<!-- END SKILL TABLE -->'
          replacement = f'<!-- BEGIN SKILL TABLE -->\n{table}\n<!-- END SKILL TABLE -->'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          readme.write_text(content)
          print('Updated README skill table')
          "

      - name: Commit results
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: agent-skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update skill eval results"
            git push
          fi
