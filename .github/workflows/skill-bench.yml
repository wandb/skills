name: Skill bench

on:
  pull_request:
    paths:
      - "skills/**"
      - ".github/workflows/skill-bench.yml"
      - "scripts/skill_bench/**"
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill to benchmark"
        default: "wandb-primary"
        required: true
      base_ref:
        description: "Base ref in this skills repo"
        default: "main"
        required: true
      candidate_ref:
        description: "Candidate ref in this skills repo"
        default: "HEAD"
        required: true
      suite:
        description: "WBAF suite, e.g. harness-smoke or wba-all"
        default: "harness-smoke"
        required: true
      harness:
        description: "WBAF harness"
        default: "claude-code-public-skill"
        required: true
      scenarios:
        description: "Optional comma-separated WBAF scenario ids"
        default: ""
        required: false
      wbaf_ref:
        description: "WandBAgentFactory ref to use"
        default: "main"
        required: true
      live:
        description: "Run live eval instead of plan-only"
        default: "false"
        required: true

jobs:
  plan:
    name: Plan WBAF skill bench
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      WBAF_REPO_TOKEN: ${{ secrets.WBAF_REPO_TOKEN }}
    steps:
      - name: Checkout public skills
        uses: actions/checkout@v4
        with:
          path: skills-repo
          fetch-depth: 0

      - name: Checkout WBAF
        if: env.WBAF_REPO_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: wandb/WandBAgentFactory
          ref: ${{ github.event.inputs.wbaf_ref || 'main' }}
          path: wbaf
          token: ${{ secrets.WBAF_REPO_TOKEN }}

      - name: Skip WBAF plan without private repo token
        if: env.WBAF_REPO_TOKEN == ''
        run: |
          echo "::notice::Skipping WBAF skill-bench plan because WBAF_REPO_TOKEN is not configured."
          exit 0

      - name: Set up Python
        if: env.WBAF_REPO_TOKEN != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        if: env.WBAF_REPO_TOKEN != ''
        uses: astral-sh/setup-uv@v4

      - name: Install WBAF dependencies
        if: env.WBAF_REPO_TOKEN != ''
        working-directory: wbaf
        run: uv sync --group dev

      - name: Run public skill bench unit tests
        if: env.WBAF_REPO_TOKEN != ''
        working-directory: skills-repo
        run: python -m unittest discover scripts/tests -v

      - name: Resolve skill and refs
        if: env.WBAF_REPO_TOKEN != ''
        id: resolve
        working-directory: skills-repo
        env:
          INPUT_SKILL: ${{ github.event.inputs.skill || '' }}
          INPUT_BASE_REF: ${{ github.event.inputs.base_ref || '' }}
          INPUT_CANDIDATE_REF: ${{ github.event.inputs.candidate_ref || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          BASE_REF="${INPUT_BASE_REF:-$PR_BASE_SHA}"
          CANDIDATE_REF="${INPUT_CANDIDATE_REF:-$PR_HEAD_SHA}"
          if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
          if [ -z "$CANDIDATE_REF" ] || [ "$CANDIDATE_REF" = "HEAD" ]; then CANDIDATE_REF="$GITHUB_SHA"; fi

          SKILL="$INPUT_SKILL"
          if [ -z "$SKILL" ]; then
            SKILL="$(python scripts/skill_bench/cli.py detect-changed-skills \
              --base-ref "$BASE_REF" \
              --candidate-ref "$CANDIDATE_REF" \
              | python -c 'import json,sys; data=json.load(sys.stdin); print((data.get("skills") or [""])[0])')"
          fi
          if [ -z "$SKILL" ]; then
            echo "::notice::No changed skill detected; skipping WBAF plan."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "skill=$SKILL" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "candidate_ref=$CANDIDATE_REF" >> "$GITHUB_OUTPUT"

      - name: Plan WBAF benchmark
        if: env.WBAF_REPO_TOKEN != '' && steps.resolve.outputs.skip != 'true'
        working-directory: skills-repo
        env:
          SKILL: ${{ steps.resolve.outputs.skill }}
          BASE_REF: ${{ steps.resolve.outputs.base_ref }}
          CANDIDATE_REF: ${{ steps.resolve.outputs.candidate_ref }}
          SUITE: ${{ github.event.inputs.suite || 'harness-smoke' }}
          HARNESS: ${{ github.event.inputs.harness || 'claude-code-public-skill' }}
          SCENARIOS: ${{ github.event.inputs.scenarios || '' }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/skill-bench"
          python scripts/skill_bench/cli.py plan \
            --wbaf-root "$GITHUB_WORKSPACE/wbaf" \
            --skill "$SKILL" \
            --base-ref "$BASE_REF" \
            --candidate-ref "$CANDIDATE_REF" \
            --pr-repo "${{ github.repository }}" \
            --suite "$SUITE" \
            --harness "$HARNESS" \
            ${SCENARIOS:+--scenarios "$SCENARIOS"} \
            --output-json "$GITHUB_WORKSPACE/skill-bench/skill-bench-plan.json" \
            --output-md "$GITHUB_WORKSPACE/skill-bench/skill-bench-report.md"
          cat "$GITHUB_WORKSPACE/skill-bench/skill-bench-report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifacts
        if: env.WBAF_REPO_TOKEN != '' && steps.resolve.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skill-bench-plan
          path: skill-bench/

      - name: Comment plan on PR
        if: env.WBAF_REPO_TOKEN != '' && steps.resolve.outputs.skip != 'true' && github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: skills-repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f "$GITHUB_WORKSPACE/skill-bench/skill-bench-report.md" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file "$GITHUB_WORKSPACE/skill-bench/skill-bench-report.md"
          fi

  live:
    name: Live skill bench
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.live == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment: skill-bench-live
    env:
      WBAF_REPO_TOKEN: ${{ secrets.WBAF_REPO_TOKEN }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      GUARDRAILS_WANDB_ENTITY: ${{ vars.GUARDRAILS_WANDB_ENTITY || 'wandb-agent-guardrails' }}
      GUARDRAILS_WANDB_API_KEY: ${{ secrets.GUARDRAILS_WANDB_API_KEY || secrets.WANDB_API_KEY }}
    steps:
      - name: Checkout public skills
        uses: actions/checkout@v4
        with:
          path: skills-repo
          fetch-depth: 0

      - name: Checkout WBAF
        uses: actions/checkout@v4
        with:
          repository: wandb/WandBAgentFactory
          ref: ${{ github.event.inputs.wbaf_ref }}
          path: wbaf
          token: ${{ secrets.WBAF_REPO_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install WBAF dependencies
        working-directory: wbaf
        run: uv sync --group dev

      - name: Run selected live benchmark
        working-directory: skills-repo
        env:
          SCENARIOS: ${{ github.event.inputs.scenarios || '' }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/skill-bench"
          python scripts/skill_bench/cli.py live \
            --wbaf-root "$GITHUB_WORKSPACE/wbaf" \
            --skill "${{ github.event.inputs.skill }}" \
            --base-ref "${{ github.event.inputs.base_ref }}" \
            --candidate-ref "${{ github.event.inputs.candidate_ref }}" \
            --pr-repo "${{ github.repository }}" \
            --suite "${{ github.event.inputs.suite }}" \
            --harness "${{ github.event.inputs.harness }}" \
            ${SCENARIOS:+--scenarios "$SCENARIOS"} \
            --output-json "$GITHUB_WORKSPACE/skill-bench/skill-bench-result.json" \
            --output-md "$GITHUB_WORKSPACE/skill-bench/skill-bench-report.md"
          cat "$GITHUB_WORKSPACE/skill-bench/skill-bench-report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-bench-live
          path: skill-bench/
